<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="刷题册">
<meta name="theme-color" content="#1f3a4d">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<title>公考刷题册</title>
<style>
:root{
  --bg:#f0f2f5;
  --surface:#ffffff;
  --surface-2:#f5f7fa;
  --border:#eaecef;
  --ink:#111827;
  --ink-2:#374151;
  --muted:#9ca3af;
  --muted-2:#c4cad3;
  --primary:#1f3a4d;
  --primary-light:#e8f0f6;
  --primary-hover:#2a4a61;
  --green:#15803d;
  --green-soft:#dcfce7;
  --red:#b91c1c;
  --red-soft:#fee2e2;
  --gold:#b45309;
  --tab-h:56px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --shadow:0 2px 8px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --shadow-lg:0 8px 24px rgba(0,0,0,.10);
  --r:12px;
  --r-sm:8px;
  --r-lg:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{background:var(--bg);}
body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans SC",sans-serif;
  font-size:16px;line-height:1.5;color:var(--ink);background:var(--bg);
  padding-top:var(--safe-top);
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;color:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}

/* ===== App shell ===== */
.app{display:flex;min-height:100vh;}

/* ===== Sidebar (iPad only) ===== */
.sidebar{display:none;flex-direction:column;width:220px;flex:none;background:var(--primary);color:#dbe3eb;
  padding:18px 0;transition:width .22s ease;position:sticky;top:0;height:100vh;overflow-y:auto;}
.sidebar.collapsed{width:60px;}
.sidebar .brand{display:flex;align-items:center;gap:10px;padding:0 18px 18px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:10px;}
.sidebar .brand .logo{width:30px;height:30px;background:#e9d5a3;color:var(--primary);border-radius:6px;font-weight:900;display:flex;align-items:center;justify-content:center;font-size:16px;flex:none;}
.sidebar .brand .name{font-size:15px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;}
.sidebar.collapsed .brand .name{display:none;}
.sidebar nav{display:flex;flex-direction:column;gap:2px;padding:0 8px;flex:1;}
.sidebar nav button{background:transparent;border:none;color:#bcc8d3;text-align:left;padding:10px 14px;border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:10px;transition:.15s;white-space:nowrap;}
.sidebar nav button:hover{background:rgba(255,255,255,.06);color:#fff;}
.sidebar nav button.on{background:rgba(255,255,255,.12);color:#fff;font-weight:600;}
.sidebar nav button .ico{width:18px;text-align:center;font-size:15px;flex:none;}
.sidebar.collapsed nav button .lbl{display:none;}
.sidebar .foot{padding:10px 14px;color:rgba(255,255,255,.4);font-size:11px;letter-spacing:.06em;}
.sidebar.collapsed .foot{display:none;}
.sidebar-toggle{background:transparent;border:none;color:#bcc8d3;padding:8px 14px;cursor:pointer;font-size:18px;text-align:left;}
.sidebar-toggle:hover{color:#fff;}

/* ===== Main ===== */
.main{flex:1;min-width:0;display:flex;flex-direction:column;min-height:100vh;}
.wrap{max-width:600px;width:100%;margin:0 auto;
  padding:16px 16px calc(var(--tab-h) + var(--safe-bottom) + 20px);}

/* ===== Bottom tab bar ===== */
.tabbar{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(255,255,255,.94);
  -webkit-backdrop-filter:blur(20px);
  backdrop-filter:blur(20px);
  border-top:1px solid rgba(0,0,0,.08);
  display:flex;align-items:stretch;
  height:calc(var(--tab-h) + var(--safe-bottom));
  padding-bottom:var(--safe-bottom);
  z-index:20;
}
.tabbar .tab{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:none;border:none;padding:6px 4px 4px;gap:2px;
  color:var(--muted);transition:.13s;
}
.tabbar .tab .ico{font-size:22px;line-height:1;display:block;opacity:.45;transition:.13s;}
.tabbar .tab .lbl{font-size:10px;font-weight:500;letter-spacing:.02em;display:block;}
.tabbar .tab.on .ico{opacity:1;}
.tabbar .tab.on .lbl{color:var(--primary);font-weight:700;}
body.quiz-mode .tabbar{display:none;}

/* ===== Page headings ===== */
.page-head{padding:16px 0 10px;}
.page-head h1{font-size:26px;font-weight:800;letter-spacing:-.4px;color:var(--ink);}

.sec-label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin:20px 0 10px;}
.empty{color:var(--muted);font-size:14px;text-align:center;padding:48px 20px;background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);}

/* ===== Category cards ===== */
.cards{display:flex;flex-direction:column;gap:10px;}
.cat-card{
  background:var(--surface);border-radius:var(--r-lg);
  padding:16px;display:flex;align-items:center;gap:14px;
  cursor:pointer;box-shadow:var(--shadow);
  transition:transform .12s,box-shadow .12s;
}
.cat-card:active{transform:scale(.98);box-shadow:0 1px 3px rgba(0,0,0,.06);}
.cat-card .glyph{
  width:50px;height:50px;flex:none;background:var(--primary);color:#fff;
  border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:20px;letter-spacing:-.5px;
}
.cat-card .body{flex:1;min-width:0;}
.cat-card .name{font-weight:700;font-size:17px;color:var(--ink);margin-bottom:4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cat-card .meta{font-size:13px;color:var(--muted);}
.cat-card .meta b{color:var(--ink-2);font-weight:600;}
.cat-card .chev{color:var(--muted-2);font-size:20px;font-weight:300;flex:none;}

/* ===== Paper cards ===== */
.paper-card{
  background:var(--surface);border-radius:var(--r);
  padding:16px;cursor:pointer;box-shadow:var(--shadow);
  transition:transform .12s,box-shadow .12s;
}
.paper-card:active{transform:scale(.98);box-shadow:0 1px 3px rgba(0,0,0,.06);}
.paper-card .p-top{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px;}
.paper-card .p-title{font-weight:700;font-size:16px;color:var(--ink);flex:1;min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.paper-card .p-count{font-size:12px;color:var(--muted);background:var(--bg);
  border-radius:6px;padding:3px 8px;white-space:nowrap;flex:none;}
.paper-card .menu-btn{background:transparent;border:none;color:var(--muted);
  font-size:20px;padding:0 4px;line-height:1;font-weight:700;letter-spacing:.5px;flex:none;}
.paper-card .p-stats{display:flex;gap:16px;align-items:center;}
.paper-card .p-stat{font-size:13px;color:var(--muted);}
.paper-card .p-stat b{color:var(--ink-2);font-weight:700;}
.paper-card .p-resume{
  margin-top:10px;padding:8px 12px;
  background:var(--primary-light);border-radius:8px;
  font-size:13px;color:var(--primary);font-weight:600;
  display:flex;align-items:center;gap:6px;
}
.paper-card .p-resume::before{content:'▶';font-size:9px;opacity:.7;}

/* ===== Menu sheet items ===== */
.menu-item{display:block;width:100%;text-align:left;background:transparent;border:none;
  padding:16px 4px;font-size:16px;color:var(--ink);cursor:pointer;
  border-bottom:1px solid var(--border);}
.menu-item:last-child{border-bottom:none;}
.menu-item:active{background:var(--surface-2);}
.menu-item.danger{color:var(--red);}
.menu-item .sub{display:block;font-size:12px;color:var(--muted);margin-top:3px;font-weight:400;}

/* ===== Breadcrumb ===== */
.crumb{display:flex;align-items:center;gap:6px;margin:0 0 10px;font-size:14px;}
.crumb button{background:none;border:none;color:var(--primary);font-size:14px;font-weight:600;padding:0;}
.crumb .cur{color:var(--ink);font-weight:700;}
.crumb .sep{color:var(--muted-2);}

/* ===== Quiz layout ===== */
body.quiz-mode .wrap{padding-bottom:calc(74px + var(--safe-bottom));}
.quiz-shell{display:flex;flex-direction:column;flex:1;}

.q-header{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:10px 16px;display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:9;
}
.q-header .back{
  background:var(--bg);border:none;color:var(--ink);
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:22px;flex:none;
}
.q-header .info{flex:1;min-width:0;}
.q-header .info .t{font-weight:700;font-size:15px;color:var(--ink);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.q-header .info .m{font-size:12px;color:var(--muted);margin-top:1px;}
.q-header .timer{
  font-variant-numeric:tabular-nums;
  background:var(--bg);color:var(--ink-2);
  font-size:13px;font-weight:600;padding:6px 12px;
  border-radius:99px;white-space:nowrap;flex:none;
}

.qprog-track{height:3px;background:var(--border);overflow:hidden;}
.qprog-fill{height:100%;background:var(--primary);transition:width .3s;}

.q-pos{
  padding:12px 16px 4px;
  display:flex;justify-content:space-between;align-items:center;
}
.q-pos .num{font-size:13px;font-weight:600;color:var(--muted);}
.q-pos .done{font-size:13px;color:var(--muted);}

.q-body{padding:4px 16px 16px;}
.q-stem-card{
  background:var(--surface);border-radius:var(--r);
  padding:18px 16px;box-shadow:var(--shadow);margin-bottom:12px;
}
.q-stem-card .stem{font-size:16px;line-height:1.8;color:var(--ink);white-space:pre-wrap;}

/* ===== Answer options ===== */
.opts{display:flex;flex-direction:column;gap:10px;}
.opt{
  display:flex;gap:14px;align-items:flex-start;
  background:var(--surface);border:2px solid var(--border);
  border-radius:var(--r);padding:14px 16px;cursor:pointer;
  box-shadow:var(--shadow);transition:.12s;
}
.opt:active{transform:scale(.99);}
.opt .tag{
  font-weight:700;font-size:14px;
  width:28px;height:28px;flex:none;
  border:2px solid var(--border);color:var(--muted);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:var(--bg);transition:.12s;
}
.opt .txt{flex:1;font-size:15px;line-height:1.65;color:var(--ink);padding-top:2px;}
.opt.sel{border-color:var(--primary);background:var(--primary-light);}
.opt.sel .tag{background:var(--primary);color:#fff;border-color:var(--primary);}
.opt.correct{border-color:var(--green);background:var(--green-soft);}
.opt.correct .tag{background:var(--green);color:#fff;border-color:var(--green);}
.opt.wrong{border-color:var(--red);background:var(--red-soft);}
.opt.wrong .tag{background:var(--red);color:#fff;border-color:var(--red);}
.graded .opt{cursor:default;}
.verdict{
  margin-top:12px;padding:12px 14px;border-radius:var(--r-sm);
  font-size:14px;font-weight:500;display:none;
}
.graded .verdict{display:block;}
.graded .verdict.ok{background:var(--green-soft);color:#14532d;}
.graded .verdict.no{background:var(--red-soft);color:#7f1d1d;}

/* ===== Quiz bottom bar ===== */
.qbar{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(255,255,255,.94);
  -webkit-backdrop-filter:blur(20px);
  backdrop-filter:blur(20px);
  border-top:1px solid rgba(0,0,0,.08);
  padding:8px 16px calc(8px + var(--safe-bottom));
  display:flex;gap:10px;align-items:center;z-index:18;
}
.qbar .icon-btn{
  background:var(--bg);border:none;color:var(--ink-2);
  width:44px;height:44px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:17px;flex:none;
}
.qbar .icon-btn.on{color:var(--gold);background:#fef3c7;}
.qbar .icon-btn.disabled{opacity:.35;pointer-events:none;}
.qbar .primary{
  flex:1;height:44px;background:var(--primary);color:#fff;
  border:none;border-radius:99px;font-size:15px;font-weight:700;
}
.qbar .primary:active{background:var(--primary-hover);}
.qbar .primary.submit{background:var(--green);}
.qbar .sub-btn{
  height:44px;background:transparent;border:2px solid var(--primary);
  color:var(--primary);border-radius:99px;font-size:13px;font-weight:700;
  padding:0 12px;flex:none;
}
.qbar .sub-btn:active{background:var(--primary-light);}

/* ===== Bottom sheets ===== */
.sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;display:none;}
.sheet-backdrop.show{display:block;}
.sheet{
  position:fixed;left:0;right:0;bottom:0;
  background:var(--surface);border-radius:20px 20px 0 0;
  padding:12px 18px calc(20px + var(--safe-bottom));
  z-index:51;transform:translateY(100%);
  transition:transform .28s cubic-bezier(.32,.72,0,1);
  max-height:72vh;overflow-y:auto;
}
.sheet.show{transform:translateY(0);}
.sheet .grab{width:36px;height:4px;background:var(--muted-2);border-radius:99px;margin:0 auto 14px;}
.sheet .s-ttl{font-weight:700;font-size:16px;margin-bottom:6px;
  display:flex;justify-content:space-between;align-items:baseline;}
.sheet .legend{font-size:12px;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px;}
.sheet .legend span{display:inline-flex;align-items:center;gap:4px;}
.sheet .legend i{width:10px;height:10px;border-radius:3px;display:inline-block;border:1px solid var(--border);}
.sheet .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(42px,1fr));gap:8px;}
.acell{
  aspect-ratio:1;border:2px solid var(--border);background:var(--bg);
  color:var(--ink-2);border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;cursor:pointer;
}
.acell.answered{border-color:var(--primary);color:var(--primary);}
.acell.correct{background:var(--green);border-color:var(--green);color:#fff;}
.acell.wrong{background:var(--red);border-color:var(--red);color:#fff;}
.acell.cur{box-shadow:0 0 0 3px rgba(31,58,77,.28);}
.sheet .acts{display:flex;gap:10px;margin-top:18px;}
.sheet .acts button{flex:1;}

/* ===== Buttons ===== */
.btn{font-size:14px;border:1.5px solid var(--border);background:var(--surface);
  color:var(--ink);padding:10px 18px;border-radius:99px;font-weight:600;}
.btn:active{background:var(--surface-2);}
.btn.primary{background:var(--primary);color:#fff;border-color:var(--primary);}
.btn.primary:active{background:var(--primary-hover);}
.btn.danger{color:var(--red);border-color:transparent;background:var(--red-soft);}
.btn.sm{font-size:13px;padding:7px 14px;}

/* ===== Scorecard ===== */
.scorecard{
  background:var(--surface);border-radius:var(--r-lg);
  padding:32px 20px;text-align:center;box-shadow:var(--shadow-lg);margin-bottom:16px;
}
.scorecard .pct{font-size:64px;font-weight:800;color:var(--primary);line-height:1;letter-spacing:-2px;}
.scorecard .pct small{font-size:24px;color:var(--muted);font-weight:600;}
.scorecard .label{font-size:14px;color:var(--muted);margin-top:10px;}
.scorecard .acts{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:22px;}

/* ===== Stats ===== */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:8px 0 20px;}
.stat-cell{background:var(--surface);border-radius:var(--r);padding:14px 10px;
  text-align:center;box-shadow:var(--shadow);}
.stat-cell .v{font-weight:800;font-size:22px;color:var(--primary);line-height:1.1;}
.stat-cell .l{font-size:11px;color:var(--muted);margin-top:4px;font-weight:500;}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin:4px 0 14px;}
.filter-row select{
  font-size:13px;border:1.5px solid var(--border);background:var(--surface);
  color:var(--ink);padding:8px 28px 8px 12px;border-radius:99px;appearance:none;
  background-image:linear-gradient(45deg,transparent 50%,var(--muted) 50%),
    linear-gradient(135deg,var(--muted) 50%,transparent 50%);
  background-position:calc(100% - 14px) center,calc(100% - 10px) center;
  background-size:4px 4px,4px 4px;background-repeat:no-repeat;
}

/* history-wrap: outer clip+shadow, history-row slides inside */
.history-wrap{position:relative;overflow:hidden;border-radius:var(--r);box-shadow:var(--shadow);}
.history-row{background:var(--surface);padding:14px 15px;position:relative;z-index:1;
  /* transition applied via JS when finger lifts */}
.history-row .top{display:flex;justify-content:space-between;gap:8px;align-items:baseline;margin-bottom:6px;}
.history-row .ttl{font-weight:700;font-size:15px;color:var(--ink);}
.history-row .ts{font-size:11px;color:var(--muted);}
.history-row .bot{display:flex;gap:14px;font-size:13px;color:var(--muted);align-items:center;}
.history-row .bot b{color:var(--ink-2);font-weight:700;}
.history-del{
  position:absolute;right:0;top:0;bottom:0;width:72px;
  background:var(--red);color:#fff;border:none;
  font-size:14px;font-weight:700;cursor:pointer;
}
.acc-hi{color:var(--green)!important;} .acc-mid{color:var(--gold)!important;} .acc-lo{color:var(--red)!important;}

.qitem{background:var(--surface);border-radius:var(--r);padding:14px 15px;box-shadow:var(--shadow);cursor:pointer;}
.qitem:active{transform:scale(.99);}
.qitem .top{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:6px;}
.qitem .src{font-size:12px;color:var(--muted);}
.qitem .stem{font-size:14px;color:var(--ink);line-height:1.6;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.qitem .bot{display:flex;gap:14px;margin-top:8px;font-size:13px;color:var(--muted);}
.qitem .bot .your{color:var(--red);font-weight:600;} .qitem .bot .ans{color:var(--green);font-weight:600;}
.qitem .actions{display:flex;gap:8px;margin-top:10px;}

/* ===== Right answer card (iPad) ===== */
.right-pane{display:none;flex:none;width:260px;border-left:1px solid var(--border);
  background:var(--surface);padding:16px;height:100vh;position:sticky;top:0;overflow-y:auto;}
.right-pane .ttl{font-weight:700;font-size:14px;margin-bottom:10px;}
.right-pane .legend{font-size:11px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.right-pane .legend i{width:10px;height:10px;border-radius:3px;border:1px solid var(--border);display:inline-block;margin-right:3px;vertical-align:middle;}
.right-pane .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.right-pane .acts{display:flex;flex-direction:column;gap:8px;margin-top:14px;}

/* ===== Data tab ===== */
.data-section p{color:var(--ink-2);font-size:14px;line-height:1.75;margin-bottom:14px;}

/* ===== Toast ===== */
.toast{
  position:fixed;left:50%;
  bottom:calc(var(--tab-h) + var(--safe-bottom) + 12px);
  transform:translateX(-50%);
  background:rgba(17,24,39,.9);color:#fff;
  padding:10px 20px;border-radius:99px;
  font-size:14px;font-weight:500;
  z-index:99;opacity:0;transition:opacity .25s;pointer-events:none;
  max-width:80vw;text-align:center;white-space:nowrap;
}
.toast.show{opacity:1;}
body.quiz-mode .toast{bottom:calc(60px + var(--safe-bottom) + 12px);}

.hidden{display:none!important;}

/* ===== iPad / wide screen ===== */
@media (min-width: 880px){
  .sidebar{display:flex;}
  .tabbar{display:none;}
  .wrap{max-width:none;padding:18px 28px 90px;}
  body.quiz-mode .right-pane{display:block;}
  body.quiz-mode .wrap{max-width:760px;}
}
@media (max-width: 879px){
  .right-pane{display:none!important;}
  .sidebar{display:none!important;}
}
</style>
</head>
<body>
<div class="app">
  <!-- ===== Sidebar (iPad only) ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="logo">政</div>
      <div class="name">公考刷题册</div>
    </div>
    <nav>
      <button data-tab="home" onclick="go('home')"><span class="ico">📚</span><span class="lbl">题库</span></button>
      <button data-tab="favs" onclick="go('favs')"><span class="ico">★</span><span class="lbl">收藏题目</span></button>
      <button data-tab="wrong" onclick="go('wrong')"><span class="ico">✕</span><span class="lbl">错题本</span></button>
      <button data-tab="stats" onclick="go('stats')"><span class="ico">📊</span><span class="lbl">统计</span></button>
      <button data-tab="data" onclick="go('data')"><span class="ico">⚙</span><span class="lbl">数据</span></button>
    </nav>

    <span><i style="background:var(--green);border-color:var(--green);"></i>正确</span>
    <span><i style="background:var(--red);border-color:var(--red);"></i>错误</span>

  <div id="menuItems"></div>

<div class="toast" id="toast"></div>

<script>
'use strict';

// =========== Constants & State ===========
const STORE_HISTORY   = 'sihai_quiz_history_v1';
const STORE_FAVS      = 'sihai_quiz_favs_v1';
const STORE_SIDEBAR   = 'sihai_quiz_sidebar_collapsed_v1';
const STORE_OVERRIDES = 'sihai_quiz_overrides_v1';  // per-paper user edits (category)
const STORE_SESSIONS  = 'sihai_quiz_sessions_v1';   // in-progress sessions

const state = {
  papers: [],
  paperData: {},
  // home drill
  homeView: 'categories',
  activeCategory: null,
  // quiz
  current: null,
  currentQ: 0,
  selected: {},
  graded: false,
  startedAt: 0,
  timerId: 0,
};

// =========== Helpers ===========
const $ = (id)=>document.getElementById(id);
function toast(msg, dur=1600){
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toast._t); toast._t = setTimeout(()=>t.classList.remove('show'), dur);
}
function uuid(){return 'h-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,8);}
function escapeHtml(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmtDate(ts){
  const d=new Date(ts), p=(n)=>String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}
function fmtDuration(sec){
  if (sec<60) return sec+'s';
  const m=Math.floor(sec/60), s=sec%60;
  if (m<60) return `${m}m${s?` ${s}s`:''}`;
  return `${Math.floor(m/60)}h ${m%60}m`;
}
function mmss(sec){
  const m=Math.floor(sec/60), s=sec%60;
  return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}
function loadHistory(){try{return JSON.parse(localStorage.getItem(STORE_HISTORY)||'[]');}catch{return[];}}
function saveHistory(a){localStorage.setItem(STORE_HISTORY, JSON.stringify(a));}
function loadFavs(){try{return JSON.parse(localStorage.getItem(STORE_FAVS)||'{}');}catch{return{};}}
function saveFavs(o){localStorage.setItem(STORE_FAVS, JSON.stringify(o));}
function loadOverrides(){try{return JSON.parse(localStorage.getItem(STORE_OVERRIDES)||'{}');}catch{return{};}}
function saveOverrides(o){localStorage.setItem(STORE_OVERRIDES, JSON.stringify(o));}
function loadSessions(){try{return JSON.parse(localStorage.getItem(STORE_SESSIONS)||'{}');}catch{return{};}}
function saveSessions(o){localStorage.setItem(STORE_SESSIONS, JSON.stringify(o));}
function getSession(pid){return loadSessions()[pid]||null;}
function setSession(pid, s){const all=loadSessions(); all[pid]=s; saveSessions(all);}
function clearSessionFor(pid){const all=loadSessions(); delete all[pid]; saveSessions(all);}

// Apply user-defined category overrides on top of the loaded papers
function applyOverrides(){
  const ov = loadOverrides();
  for (const p of state.papers){
    if (ov[p.id] && ov[p.id].category){
      p.category = ov[p.id].category;
    }
  }
}

// =========== Routing ===========
function go(tab){
  // hide quiz mode first
  document.body.classList.remove('quiz-mode');
  ['home','favs','wrong','stats','data','quiz'].forEach(t=>{
    const sec = $('page-'+t); if (sec) sec.classList.add('hidden');
  });
  $('qbar').classList.add('hidden');
  // mark active on both navs
  document.querySelectorAll('.tabbar .tab, .sidebar nav button').forEach(b=>{
    b.classList.toggle('on', b.dataset.tab === tab);
  });
  $('page-'+tab).classList.remove('hidden');
  if (tab === 'home')  renderHome();
  if (tab === 'favs')  renderFavs();
  if (tab === 'wrong') renderWrong();
  if (tab === 'stats') renderStats();
  window.scrollTo({top:0,behavior:'instant'});
}

// =========== Sidebar ===========
function toggleSidebar(){
  const sb = $('sidebar');
  sb.classList.toggle('collapsed');
  localStorage.setItem(STORE_SIDEBAR, sb.classList.contains('collapsed') ? '1' : '0');
}
function initSidebar(){
  if (localStorage.getItem(STORE_SIDEBAR) === '1'){
    $('sidebar').classList.add('collapsed');
  }
}

// =========== Init ===========
async function init(){
  initSidebar();
  try{
    const res = await fetch('data/index.json', {cache:'no-cache'});
    const idx = await res.json();
    state.papers = idx.papers || [];
    applyOverrides();
  }catch(e){
    state.papers = []; toast('题库索引加载失败');
  }
  go('home');
  if ('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  }
}

// =========== Home ===========
function renderHome(){
  const root = $('homeContent'); root.innerHTML = '';
  if (!state.papers.length){
    root.innerHTML = '<div class="empty">还没有题册。请向项目仓库追加题册数据。</div>';
    return;
  }
  if (state.homeView === 'categories'){
    renderCategoryList(root);
  } else {
    renderPaperList(root, state.activeCategory);
  }
}
function renderCategoryList(root){
  const groups = {};
  for (const p of state.papers){
    (groups[p.category] = groups[p.category] || []).push(p);
  }
  const hist = loadHistory();
  const histByCat = {};
  for (const h of hist){
    (histByCat[h.category] = histByCat[h.category] || []).push(h);
  }
  const label = document.createElement('div');
  label.className = 'sec-label';
  label.textContent = Object.keys(groups).length + ' 个分类';
  root.appendChild(label);
  const cards = document.createElement('div'); cards.className = 'cards';
  for (const cat of Object.keys(groups)){
    const ps = groups[cat];
    const totalQ = ps.reduce((s,p)=>s+p.count,0);
    const recs = histByCat[cat] || [];
    const att = recs.length;
    const avgAcc = att
      ? recs.reduce((s,r)=>s+r.correctCount,0) / recs.reduce((s,r)=>s+r.total,0)
      : null;
    const card = document.createElement('div'); card.className = 'cat-card';
    const metaTxt = att
      ? `<b>${ps.length}</b> 套 &nbsp;·&nbsp; 做了 <b>${att}</b> 次 &nbsp;·&nbsp; 均 <b>${Math.round(avgAcc*100)}%</b>`
      : `<b>${ps.length}</b> 套 &nbsp;·&nbsp; ${totalQ} 题`;
    card.innerHTML = `
      <div class="glyph">${escapeHtml(cat.charAt(0))}</div>
      <div class="body">
        <div class="name">${escapeHtml(cat)}</div>
        <div class="meta">${metaTxt}</div>
      </div>
      <div class="chev">›</div>`;
    card.onclick = ()=>enterCategory(cat);
    cards.appendChild(card);
  }
  root.appendChild(cards);
}
function renderPaperList(root, cat){
  const crumb = document.createElement('div'); crumb.className = 'crumb';
  crumb.innerHTML = `<button onclick="backToCategories()">‹ 题库</button><span class="sep"> / </span><span class="cur">${escapeHtml(cat)}</span>`;
  root.appendChild(crumb);

  const ps = state.papers.filter(p=>p.category===cat);
  const hist = loadHistory();
  const byPaper = {};
  for (const h of hist){
    (byPaper[h.paperId] = byPaper[h.paperId] || []).push(h);
  }
  const label = document.createElement('div'); label.className = 'sec-label';
  label.textContent = ps.length + ' 套试卷';
  root.appendChild(label);
  const cards = document.createElement('div'); cards.className = 'cards';
  for (const p of ps){
    const recs = byPaper[p.id] || [];
    const att = recs.length;
    const best = att ? Math.max(...recs.map(r=>r.accuracy)) : null;
    const last = att ? recs[recs.length-1] : null;
    const sess = getSession(p.id);
    const card = document.createElement('div'); card.className = 'paper-card';
    const resumeBadge = (sess && Object.keys(sess.selected||{}).length>0)
      ? `<div class="p-resume">上次第 ${(sess.currentQ||0)+1} 题 · 已答 ${Object.keys(sess.selected).length}/${p.count} · ${fmtDuration(Math.floor((sess.elapsedMs||0)/1000))}</div>`
      : '';
    const statHtml = att
      ? `<span class="p-stat">已做 <b>${att}</b> 次</span><span class="p-stat">最高 <b>${Math.round(best*100)}%</b></span>`
      : `<span class="p-stat" style="color:var(--muted-2)">未做过</span>`;
    card.innerHTML = `
      <div class="p-top">
        <div class="p-title">${escapeHtml(p.title)}</div>
        <div class="p-count">${p.count} 题</div>
        <button class="menu-btn" title="更多">⋯</button>
      </div>
      <div class="p-stats">${statHtml}</div>
      ${resumeBadge}`;
    card.querySelector('.menu-btn').addEventListener('click', (e)=>{
      e.stopPropagation();
      openPaperMenu(p);
    });
    card.onclick = ()=>openPaper(p.id);
    cards.appendChild(card);
  }
  root.appendChild(cards);
}

// Click a paper card → if there's a saved session, ask to resume; otherwise start fresh
function openPaper(pid){
  const sess = getSession(pid);
  if (sess && Object.keys(sess.selected||{}).length>0){
    const ans = Object.keys(sess.selected).length;
    const mins = Math.floor((sess.elapsedMs||0)/60000);
    const ok = confirm(`检测到上次进度：第 ${(sess.currentQ||0)+1} 题，已答 ${ans} 题，用时约 ${mins} 分钟。\n\n点【确定】继续，点【取消】重新开始。`);
    if (ok) return startQuiz(pid, { resume:true });
    clearSessionFor(pid);
  }
  startQuiz(pid);
}
function enterCategory(cat){ state.homeView='papers'; state.activeCategory=cat; renderHome(); window.scrollTo({top:0,behavior:'instant'}); }
function backToCategories(){ state.homeView='categories'; state.activeCategory=null; renderHome(); window.scrollTo({top:0,behavior:'instant'}); }

// =========== Paper menu (⋯) ===========
function openMenu(title, items){
  $('menuTtl').textContent = title;
  const root = $('menuItems'); root.innerHTML = '';
  for (const it of items){
    const b = document.createElement('button');
    b.className = 'menu-item' + (it.danger?' danger':'');
    b.innerHTML = it.label + (it.sub?`<span class="sub">${escapeHtml(it.sub)}</span>`:'');
    b.addEventListener('click', ()=>{ closeMenu(); setTimeout(it.onClick, 50); });
    root.appendChild(b);
  }
  $('menuSheet').classList.add('show');
  $('menuBd').classList.add('show');
}
function closeMenu(){
  $('menuSheet').classList.remove('show');
  $('menuBd').classList.remove('show');
}
function openPaperMenu(p){
  const sess = getSession(p.id);
  const hist = loadHistory().filter(h=>h.paperId===p.id);
  const items = [];
  items.push({ label:'更改分类', sub:'当前：'+p.category, onClick:()=>promptCategoryChange(p) });
  if (hist.length || sess){
    items.push({ label:`清空本套记录 (${hist.length} 条历史${sess?' + 进行中进度':''})`, danger:true, onClick:()=>clearPaperData(p) });
  }
  items.push({ label:'取消', onClick:()=>{} });
  openMenu(p.title, items);
}

function promptCategoryChange(p){
  // build options: existing distinct categories + 新建分类
  const existing = [...new Set(state.papers.map(x=>x.category))];
  const items = existing.map(c=>({
    label: c + (c===p.category?'  ✓':''),
    onClick: ()=>setPaperCategory(p, c),
  }));
  items.push({ label:'＋ 新建分类…', onClick:()=>{
    const name = (prompt('新分类名称（例如：言语理解 / 资料分析 / 套题训练 / 课程试卷）','')||'').trim();
    if (name) setPaperCategory(p, name);
  }});
  items.push({ label:'取消', onClick:()=>{} });
  openMenu('为《'+p.title+'》选择分类', items);
}

function setPaperCategory(p, newCat){
  if (!newCat || newCat === p.category){ return; }
  // persist override
  const ov = loadOverrides();
  ov[p.id] = ov[p.id] || {};
  ov[p.id].category = newCat;
  saveOverrides(ov);
  p.category = newCat;
  // update all history rows for this paper to keep stats consistent
  const hist = loadHistory();
  let changed = 0;
  for (const h of hist){ if (h.paperId === p.id && h.category !== newCat){ h.category = newCat; changed++; } }
  if (changed) saveHistory(hist);
  toast('已分类到「'+newCat+'」');
  // re-render: if we were inside the old category and it's now empty, back out
  if (state.homeView === 'papers'){
    const stillHas = state.papers.some(x=>x.category===state.activeCategory);
    if (!stillHas) backToCategories();
    else if (state.activeCategory !== newCat){ renderHome(); }
    else renderHome();
  } else { renderHome(); }
}

function clearPaperData(p){
  if (!confirm(`确定清空《${p.title}》的所有做题记录和进行中的进度？\n此操作不可撤销。`)) return;
  const next = loadHistory().filter(h=>h.paperId !== p.id);
  saveHistory(next);
  clearSessionFor(p.id);
  toast('已清空');
  renderHome();
}

// =========== Quiz ===========
async function loadPaper(id){
  if (state.paperData[id]) return state.paperData[id];
  const p = state.papers.find(x=>x.id===id);
  if (!p) throw new Error('paper not found');
  const res = await fetch(p.file, {cache:'no-cache'});
  const data = await res.json();
  state.paperData[id] = data;
  return data;
}

async function startQuiz(id, opts){
  // opts: { resume?:bool, jumpToQNum?:int }
  opts = opts || {};
  // backward-compat: previous signature was startQuiz(id, qNum)
  if (typeof opts === 'number') opts = { jumpToQNum: opts };
  const data = await loadPaper(id);
  state.current = data;
  state.currentQ = 0;
  state.selected = {};
  state.graded = false;
  state.startedAt = Date.now();
  // resume from saved session
  if (opts.resume){
    const sess = getSession(id);
    if (sess){
      state.selected = sess.selected || {};
      state.currentQ = sess.currentQ || 0;
      state.startedAt = Date.now() - (sess.elapsedMs || 0);
    }
  } else {
    // fresh start clears any stale session for this paper
    clearSessionFor(id);
  }
  // hide non-quiz sections
  ['home','favs','wrong','stats','data'].forEach(t=>$('page-'+t).classList.add('hidden'));
  $('page-quiz').classList.remove('hidden');
  $('qbar').classList.remove('hidden');
  $('submitBtn').style.display = '';
  document.body.classList.add('quiz-mode');
  // header (no category text)
  $('quizTitle').textContent = data.title;
  $('quizMeta').textContent  = '共 ' + data.questions.length + ' 题';
  // timer
  startTimer();
  // reset next handler in case scorecard reassigned it
  $('nextBtn').onclick = nextOrSubmit;
  // jump after restoration
  if (opts.jumpToQNum != null){
    const idx = data.questions.findIndex(q=>q.num===opts.jumpToQNum);
    if (idx>=0) state.currentQ = idx;
  }
  renderCurrentQ();
}

function startTimer(){
  clearInterval(state.timerId);
  state.timerId = setInterval(()=>{
    const sec = Math.floor((Date.now()-state.startedAt)/1000);
    $('quizTimer').textContent = mmss(sec);
  }, 500);
  $('quizTimer').textContent = '00:00';
}
function stopTimer(){ clearInterval(state.timerId); state.timerId=0; }

function renderCurrentQ(){
  const data = state.current;
  const i = state.currentQ;
  const item = data.questions[i];
  const total = data.questions.length;
  // progress
  const done = Object.keys(state.selected).length;
  $('qprogFill').style.width = (state.graded ? 100 : (i+1)/total*100) + '%';
  // meta
  $('qMetaLeft').textContent = `第 ${item.num} 题 / 共 ${total} 题`;
  $('qMetaRight').textContent = state.graded ? '已判分' : `已答 ${done}/${total}`;
  // body
  const body = $('qBody');
  body.innerHTML = `
    <div class="q-stem-card" id="qCard">
      <div class="stem">${escapeHtml(item.stem)}</div>
    </div>
    <div class="opts ${state.graded ? 'graded' : ''}" id="optsBox">
      ${['A','B','C','D'].map(L=>{
        const ans = state.selected[item.num];
        // Color the previously-selected option (changeable before graded)
        let cls = '';
        if (ans && L === ans) cls = ans === item.answer ? 'correct' : 'wrong';
        return `<div class="opt ${cls}" data-key="${L}"><div class="tag">${L}</div><div class="txt">${escapeHtml(item.options[L]||'')}</div></div>`;
      }).join('')}
    </div>
  `;
  if (!state.graded){
    body.querySelectorAll('.opt').forEach(o=>o.addEventListener('click', onOptClick));
  }
  // favorite state
  updateFavBtn();
  // next button label
  const last = i === total-1;
  $('nextBtn').textContent = state.graded
    ? (last ? '查看成绩' : '下一题')
    : (last ? '提交并判分' : '下一题');
  $('nextBtn').classList.toggle('submit', !state.graded && last);
  // prev disabled state
  $('prevBtn').classList.toggle('disabled', i===0);
  // right-pane grid (iPad) + sheet grid both refresh
  renderAnswerGrids();
}

function onOptClick(e){
  if (state.graded) return;
  const qIdx = state.currentQ;
  const item = state.current.questions[qIdx];
  if (!item) return;

  const el = e.currentTarget;
  const L = el.dataset.key;
  if (!L) return;

  const wasAnswered = state.selected[item.num] != null;
  state.selected[item.num] = L;

  // Update option colors in-place (clear all, highlight only selected)
  const optsBox = document.getElementById('optsBox');
  if (optsBox) {
    const correctAnswer = String(item.answer || '').trim();
    optsBox.querySelectorAll('.opt').forEach(o => {
      const oL = o.dataset.key;
      o.classList.remove('correct', 'wrong');
      if (oL === L) {
        o.classList.add(oL === correctAnswer ? 'correct' : 'wrong');
      }
    });
  }

  // Update meta count
  const done = Object.keys(state.selected).length;
  const total = state.current.questions.length;
  $('qMetaRight').textContent = `已答 ${done}/${total}`;

  // Update next button label on last question
  const last = qIdx === total - 1;
  if (last) {
    $('nextBtn').textContent = '提交并判分';
    $('nextBtn').classList.add('submit');
  }

  renderAnswerGrids();

  // Auto-advance only on FIRST selection — if changing a previous answer, stay put
  if (!wasAnswered && !last) {
    setTimeout(() => {
      if (!state.graded && state.currentQ === qIdx) nextOrSubmit();
    }, 850);
  }
}

function prevQ(){
  if (state.currentQ === 0) return;
  state.currentQ--;
  renderCurrentQ();
  window.scrollTo({top:0,behavior:'instant'});
}
function nextOrSubmit(){
  const last = state.currentQ === state.current.questions.length - 1;
  if (state.graded){
    if (!last){ state.currentQ++; renderCurrentQ(); window.scrollTo({top:0,behavior:'instant'}); }
    else { showScorecard(); }
    return;
  }
  if (last){ submitGrade(); return; }
  state.currentQ++; renderCurrentQ();
  window.scrollTo({top:0,behavior:'instant'});
}
function jumpQ(idx){
  state.currentQ = idx;
  renderCurrentQ();
  closeSheet();
  window.scrollTo({top:0,behavior:'instant'});
}

function submitGrade(){
  const data = state.current;
  const unanswered = data.questions.length - Object.keys(state.selected).length;
  if (unanswered > 0 && !state.graded){
    if (!confirm(`还有 ${unanswered} 题未作答，确定提交？`)){ closeSheet(); return; }
  }
  state.graded = true;
  stopTimer();
  $('submitBtn').style.display = 'none';
  // compute
  let correct = 0;
  for (const item of data.questions){
    if (state.selected[item.num] === item.answer) correct++;
  }
  const total = data.questions.length;
  const acc = correct/total;
  const dur = Math.round((Date.now()-state.startedAt)/1000);
  const rec = {
    sessionId: uuid(),
    paperId: data.id,
    paperTitle: data.title,
    category: data.category,
    startedAt: state.startedAt,
    finishedAt: Date.now(),
    durationSec: dur,
    answers: {...state.selected},
    correctCount: correct,
    total, accuracy: acc,
  };
  const hist = loadHistory(); hist.push(rec); saveHistory(hist);
  clearSessionFor(data.id);  // submitted → drop in-progress
  closeSheet();
  toast(`已提交 · 正确率 ${Math.round(acc*100)}%`);
  showScorecard(rec);
}

function showScorecard(precomputed){
  const data = state.current;
  let correct = 0;
  for (const item of data.questions){
    if (state.selected[item.num] === item.answer) correct++;
  }
  const total = data.questions.length;
  const acc = correct/total;
  const dur = Math.round(((precomputed && precomputed.durationSec) || (Date.now()-state.startedAt)/1000));
  const body = $('qBody');
  body.innerHTML = `
    <div class="scorecard">
      <div class="pct">${Math.round(acc*100)}<small>%</small></div>
      <div class="label">${correct} / ${total} 题正确 · 用时 ${fmtDuration(dur)}</div>
      <div class="acts">
        <button class="btn" onclick="reviewWrong()">查看错题</button>
        <button class="btn" onclick="restartQuiz()">再做一遍</button>
        <button class="btn primary" onclick="quitQuiz()">返回题库</button>
      </div>
    </div>
  `;
  $('qprogFill').style.width = '100%';
  $('qMetaRight').textContent = '已判分';
  $('nextBtn').textContent = '查看题目';
  $('nextBtn').classList.remove('submit');
  $('nextBtn').onclick = ()=>{ state.currentQ = 0; renderCurrentQ(); window.scrollTo({top:0,behavior:'instant'}); };
}

function reviewWrong(){
  const data = state.current;
  const firstWrong = data.questions.findIndex(q=>state.selected[q.num] !== q.answer);
  if (firstWrong === -1){ toast('全对，没有错题'); return; }
  state.currentQ = firstWrong;
  renderCurrentQ();
  $('nextBtn').onclick = nextOrSubmit;
  window.scrollTo({top:0,behavior:'instant'});
}

function restartQuiz(){
  const id = state.current.id;
  clearSessionFor(id);
  startQuiz(id);
}

function quitQuiz(){
  // Auto-save in-progress session (timer pauses, can resume next time)
  if (state.current && !state.graded && Object.keys(state.selected).length>0){
    setSession(state.current.id, {
      selected: {...state.selected},
      currentQ: state.currentQ,
      elapsedMs: Date.now() - state.startedAt,
      savedAt: Date.now(),
    });
    toast('进度已暂存，下次可继续');
  }
  stopTimer();
  state.current = null;
  $('nextBtn').onclick = nextOrSubmit;
  go('home');
}

// =========== Answer card grids ===========
function renderAnswerGrids(){
  if (!state.current) return;
  const html = [];
  state.current.questions.forEach((q, idx)=>{
    let cls = 'acell';
    if (state.graded){
      if (state.selected[q.num] === q.answer) cls += ' correct';
      else if (state.selected[q.num]) cls += ' wrong';
      else cls += ' wrong'; // unanswered also marked wrong
    } else if (state.selected[q.num]){ cls += ' answered'; }
    if (idx === state.currentQ) cls += ' cur';
    html.push(`<div class="${cls}" onclick="jumpQ(${idx})">${q.num}</div>`);
  });
  const joined = html.join('');
  $('rightGrid').innerHTML = joined;
  $('sheetGrid').innerHTML = joined;
  // Submit btn states
  const submitDisabled = state.graded;
  $('rightSubmit').textContent = submitDisabled ? '已判分' : '提交并判分';
  $('rightSubmit').disabled = submitDisabled;
  $('sheetSubmit').textContent = submitDisabled ? '已判分' : '提交并判分';
  $('sheetSubmit').disabled = submitDisabled;
  $('sheetSub').textContent = `${state.currentQ+1} / ${state.current.questions.length}`;
}
function openSheet(){ $('sheet').classList.add('show'); $('sheetBd').classList.add('show'); }
function closeSheet(){ $('sheet').classList.remove('show'); $('sheetBd').classList.remove('show'); }

// =========== Favorites ===========
function isFav(paperId, qNum){
  const f = loadFavs();
  return (f[paperId]||[]).includes(qNum);
}
function toggleFav(){
  if (!state.current) return;
  const qNum = state.current.questions[state.currentQ].num;
  const f = loadFavs();
  f[state.current.id] = f[state.current.id] || [];
  const list = f[state.current.id];
  const i = list.indexOf(qNum);
  if (i>=0){ list.splice(i,1); toast('已取消收藏'); }
  else { list.push(qNum); toast('已收藏'); }
  saveFavs(f);
  updateFavBtn();
}
function updateFavBtn(){
  if (!state.current) return;
  const qNum = state.current.questions[state.currentQ].num;
  const on = isFav(state.current.id, qNum);
  const b = $('favBtn');
  b.textContent = on ? '★' : '☆';
  b.classList.toggle('on', on);
}

async function renderFavs(){
  const root = $('favsContent'); root.innerHTML = '';
  const favs = loadFavs();
  const pairs = [];
  for (const pid of Object.keys(favs)){
    for (const qn of favs[pid]) pairs.push([pid, qn]);
  }
  if (!pairs.length){
    root.innerHTML = '<div class="empty">还没有收藏。在做题页点击 ☆ 即可收藏当前题目。</div>';
    return;
  }
  // ensure paper data
  const needed = [...new Set(pairs.map(p=>p[0]))];
  for (const pid of needed){
    try{ await loadPaper(pid); }catch{}
  }
  // group by paper
  const byPaper = {};
  for (const [pid,qn] of pairs){
    (byPaper[pid] = byPaper[pid] || []).push(qn);
  }
  for (const pid of Object.keys(byPaper)){
    const data = state.paperData[pid];
    if (!data) continue;
    const head = document.createElement('div'); head.className='sec-label';
    head.textContent = data.title + ' · ' + byPaper[pid].length + ' 题';
    root.appendChild(head);
    const wrap = document.createElement('div'); wrap.className='cards';
    for (const qn of byPaper[pid]){
      const q = data.questions.find(x=>x.num===qn);
      if (!q) continue;
      const item = document.createElement('div'); item.className='qitem';
      item.innerHTML = `
        <div class="top"><span style="font-weight:700;">第 ${q.num} 题</span><span class="src">${escapeHtml(data.category||'')}</span></div>
        <div class="stem">${escapeHtml(q.stem)}</div>
        <div class="actions">
          <button class="btn sm" onclick="event.stopPropagation();startQuiz('${pid}',${qn})">去做</button>
          <button class="btn sm danger" onclick="event.stopPropagation();unfav('${pid}',${qn})">移除</button>
        </div>`;
      item.onclick = ()=>startQuiz(pid, qn);
      wrap.appendChild(item);
    }
    root.appendChild(wrap);
  }
}
function unfav(pid, qn){
  const f = loadFavs();
  if (!f[pid]) return;
  f[pid] = f[pid].filter(x=>x!==qn);
  if (!f[pid].length) delete f[pid];
  saveFavs(f);
  renderFavs();
}

// =========== Wrong (错题本) ===========
async function renderWrong(){
  const root = $('wrongContent'); root.innerHTML = '';
  const hist = loadHistory();

  // Populate filter dropdowns
  const wfCat = $('wfCat'); const prevCat = wfCat.value;
  const wfPaper = $('wfPaper'); const prevPaper = wfPaper.value;
  const cats = [...new Set(state.papers.map(p=>p.category))];
  wfCat.innerHTML = '<option value="">全部分类</option>' +
    cats.map(c=>`<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
  wfCat.value = prevCat;
  const selCat = wfCat.value;
  wfPaper.innerHTML = '<option value="">全部题册</option>' +
    state.papers
      .filter(p => !selCat || p.category === selCat)
      .map(p=>`<option value="${p.id}">${escapeHtml(p.title)}</option>`).join('');
  wfPaper.value = prevPaper;
  const selPaper = wfPaper.value;

  if (!hist.length){
    root.innerHTML = '<div class="empty">还没有做题记录，做完一套题之后做错的题会出现在这里。</div>';
    return;
  }
  // Need paper data for all referenced papers
  const pids = [...new Set(hist.map(h=>h.paperId))];
  for (const pid of pids){ try{ await loadPaper(pid); }catch{} }
  // Aggregate wrong answers across all history
  const agg = {};
  for (const h of hist){
    const data = state.paperData[h.paperId]; if (!data) continue;
    // apply filters
    if (selPaper && h.paperId !== selPaper) continue;
    if (selCat && data.category !== selCat) continue;
    for (const q of data.questions){
      const userAns = h.answers[q.num];
      const wrong = userAns && userAns !== q.answer;
      if (!wrong) continue;
      const key = h.paperId + '::' + q.num;
      if (!agg[key]) agg[key] = { pid:h.paperId, qn:q.num, count:0, lastTs:0, lastWrong:null };
      agg[key].count++;
      if (h.finishedAt > agg[key].lastTs){
        agg[key].lastTs = h.finishedAt;
        agg[key].lastWrong = userAns;
      }
    }
  }
  const items = Object.values(agg).sort((a,b)=>b.count-a.count || b.lastTs-a.lastTs);
  if (!items.length){
    const msg = (selCat || selPaper) ? '该筛选条件下没有错题。' : '全部做对！还没有错题。';
    root.innerHTML = `<div class="empty">${msg}</div>`;
    return;
  }
  // group by paper
  const byPaper = {};
  for (const it of items){ (byPaper[it.pid] = byPaper[it.pid] || []).push(it); }
  for (const pid of Object.keys(byPaper)){
    const data = state.paperData[pid]; if (!data) continue;
    const head = document.createElement('div'); head.className='sec-label';
    head.textContent = data.title + ' · ' + byPaper[pid].length + ' 题错过';
    root.appendChild(head);
    const wrap = document.createElement('div'); wrap.className='cards';
    for (const it of byPaper[pid]){
      const q = data.questions.find(x=>x.num===it.qn); if (!q) continue;
      const item = document.createElement('div'); item.className='qitem';
      item.innerHTML = `
        <div class="top">
          <span style="font-weight:700;">第 ${q.num} 题</span>
          <span class="src">错 ${it.count} 次 · ${new Date(it.lastTs).toISOString().slice(0,10)}</span>
        </div>
        <div class="stem">${escapeHtml(q.stem)}</div>
        <div class="bot">
          <span class="your">你答：${escapeHtml(it.lastWrong||'')}</span>
          <span class="ans">正确：${escapeHtml(q.answer)}</span>
        </div>
        <div class="actions">
          <button class="btn sm" onclick="event.stopPropagation();startQuiz('${pid}',${it.qn})">重做这题</button>
        </div>`;
      item.onclick = ()=>startQuiz(pid, it.qn);
      wrap.appendChild(item);
    }
    root.appendChild(wrap);
  }
}

// =========== Swipe-to-delete for history rows ===========
let _openSwipeRow = null;
function enableSwipeDelete(wrapEl) {
  const row = wrapEl.querySelector('.history-row');
  const DEL_W = 72;
  let sx = 0, sy = 0, active = false, opened = false;

  row.addEventListener('touchstart', e => {
    // Close any other open row first
    if (_openSwipeRow && _openSwipeRow !== row) {
      _openSwipeRow.style.transition = 'transform .22s ease';
      _openSwipeRow.style.transform = 'translateX(0)';
      _openSwipeRow = null;
    }
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
    active = true;
    row.style.transition = 'none';
  }, {passive:true});

  row.addEventListener('touchmove', e => {
    if (!active) return;
    const dx = e.touches[0].clientX - sx;
    const dy = Math.abs(e.touches[0].clientY - sy);
    // Abort if mostly vertical (user is scrolling)
    if (dy > 10 && dy > Math.abs(dx)) { active = false; row.style.transition = ''; return; }
    const base = opened ? -DEL_W : 0;
    const next = Math.min(0, Math.max(base + dx, -DEL_W));
    row.style.transform = `translateX(${next}px)`;
  }, {passive:true});

  row.addEventListener('touchend', e => {
    if (!active) return;
    active = false;
    row.style.transition = 'transform .22s ease';
    const dx = e.changedTouches[0].clientX - sx;
    const base = opened ? -DEL_W : 0;
    if (base + dx < -DEL_W / 2) {
      opened = true;
      _openSwipeRow = row;
      row.style.transform = `translateX(-${DEL_W}px)`;
    } else {
      opened = false;
      if (_openSwipeRow === row) _openSwipeRow = null;
      row.style.transform = 'translateX(0)';
    }
  }, {passive:true});
}

// =========== Stats ===========
function renderStats(){
  const hist = loadHistory();
  const cats = [...new Set(state.papers.map(p=>p.category))];
  const fCat = $('fCat'); const curCat = fCat.value;
  fCat.innerHTML = '<option value="">全部分类</option>' + cats.map(c=>`<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
  fCat.value = curCat;
  const fPaper = $('fPaper'); const curPaper = fPaper.value;
  fPaper.innerHTML = '<option value="">全部题册</option>' + state.papers
    .filter(p=>!curCat || p.category===curCat)
    .map(p=>`<option value="${p.id}">${escapeHtml(p.title)}</option>`).join('');
  fPaper.value = curPaper;
  const cat = fCat.value, pid = fPaper.value, range = $('fRange').value;
  let cutoff = 0;
  if (range !== 'all') cutoff = Date.now() - +range*86400000;
  const filtered = hist.filter(h=>{
    if (cat && h.category !== cat) return false;
    if (pid && h.paperId !== pid) return false;
    if (cutoff && h.finishedAt < cutoff) return false;
    return true;
  });
  const att = filtered.length;
  const totalQ = filtered.reduce((s,h)=>s+h.total,0);
  const totalC = filtered.reduce((s,h)=>s+h.correctCount,0);
  const totalT = filtered.reduce((s,h)=>s+h.durationSec,0);
  $('sAttempts').textContent = att;
  $('sAvgAcc').textContent = att ? Math.round(totalC/totalQ*100)+'%' : '—';
  $('sBestAcc').textContent = att ? Math.round(Math.max(...filtered.map(h=>h.accuracy))*100)+'%' : '—';
  $('sTotalQ').textContent = totalQ;
  $('sCorrect').textContent = totalC;
  $('sTime').textContent = fmtDuration(totalT);
  const list = $('historyList'); list.innerHTML = '';
  if (!filtered.length){ list.innerHTML = '<div class="empty">没有匹配的做题记录。</div>'; return; }
  const sorted = filtered.slice().sort((a,b)=>b.finishedAt-a.finishedAt);
  for (const h of sorted){
    const accPct = Math.round(h.accuracy*100);
    const cls = accPct>=80?'acc-hi':accPct>=60?'acc-mid':'acc-lo';
    const wrap = document.createElement('div'); wrap.className = 'history-wrap';
    const row = document.createElement('div'); row.className = 'history-row';
    row.innerHTML = `
      <div class="top">
        <span class="ttl">${escapeHtml(h.paperTitle)}</span>
        <span class="ts">${fmtDate(h.finishedAt)}</span>
      </div>
      <div class="bot">
        <span>正确率 <b class="${cls}">${accPct}%</b></span>
        <span>${h.correctCount}/${h.total}</span>
        <span>用时 ${fmtDuration(h.durationSec)}</span>
      </div>`;
    const delBtn = document.createElement('button');
    delBtn.className = 'history-del';
    delBtn.textContent = '删除';
    delBtn.addEventListener('click', () => deleteHistory(h.sessionId));
    wrap.appendChild(row);
    wrap.appendChild(delBtn);
    enableSwipeDelete(wrap);
    list.appendChild(wrap);
  }
}
function deleteHistory(id){
  if (!confirm('删除这条做题记录？此操作不可撤销。')) return;
  const next = loadHistory().filter(h=>h.sessionId !== id);
  saveHistory(next);
  toast('已删除');
  renderStats();
}
document.addEventListener('change', (e)=>{
  if (['fCat','fPaper','fRange'].includes(e.target.id)) renderStats();
  if (['wfCat','wfPaper'].includes(e.target.id)) renderWrong();
});

// =========== Data ===========
function exportData(){
  const data = {
    exportedAt: new Date().toISOString(),
    history: loadHistory(),
    favorites: loadFavs(),
    overrides: loadOverrides(),
  };
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `sihai-quiz-backup-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 800);
  toast('已导出');
}
function importData(ev){
  const f = ev.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ()=>{
    try{
      const obj = JSON.parse(r.result);
      // history merge
      if (Array.isArray(obj.history) || Array.isArray(obj)){
        const incoming = obj.history || obj;
        const cur = loadHistory();
        const seen = new Set(cur.map(h=>h.sessionId));
        saveHistory(cur.concat(incoming.filter(h=>!seen.has(h.sessionId))));
      }
      // favorites merge
      if (obj.favorites && typeof obj.favorites === 'object'){
        const cur = loadFavs();
        for (const pid of Object.keys(obj.favorites)){
          const incoming = obj.favorites[pid] || [];
          const merged = Array.from(new Set([...(cur[pid]||[]), ...incoming]));
          cur[pid] = merged;
        }
        saveFavs(cur);
      }
      // overrides (category) merge — incoming wins
      if (obj.overrides && typeof obj.overrides === 'object'){
        const cur = loadOverrides();
        for (const pid of Object.keys(obj.overrides)){
          cur[pid] = Object.assign(cur[pid]||{}, obj.overrides[pid]||{});
        }
        saveOverrides(cur);
        applyOverrides();
      }
      toast('已合并');
      go('stats');
    }catch(e){ alert('导入失败：'+e.message); }
  };
  r.readAsText(f);
  ev.target.value = '';
}
function clearAllData(){
  if (!confirm('确定清空所有做题记录、收藏、进行中的进度与自定义分类？此操作不可恢复。')) return;
  localStorage.removeItem(STORE_HISTORY);
  localStorage.removeItem(STORE_FAVS);
  localStorage.removeItem(STORE_SESSIONS);
  localStorage.removeItem(STORE_OVERRIDES);
  toast('已清空');
  location.reload();
}

init();
